name: Refresh financials

on:
  schedule:
    - cron: '0 6 1 * *'      # 1st of each month, 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-financials
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Fetch Screener financials
        env:
          SCREENER_SESSIONID: ${{ secrets.SCREENER_SESSIONID }}
        run: npx tsx scripts/ingest/screener.ts
      - name: Rebuild snapshots
        run: npm run data:build
      - name: Commit & push if changed
        run: |
          git config user.name "solardash-bot"
          git config user.email "actions@users.noreply.github.com"
          git add manual-data/companies/screener src/data/snapshots/companies
          if git diff --cached --quiet; then
            echo "No financial changes."
          else
            git commit -m "chore(data): refresh company financials"
            git push
          fi
