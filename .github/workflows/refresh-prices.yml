name: Refresh PV prices

on:
  schedule:
    - cron: '0 6 * * 3'      # Wednesday 06:00 UTC (staggered off the Monday Screener run)
  workflow_dispatch:
    inputs:
      debug:
        description: "Verbose fetch diagnostics (status, content-type, body head)"
        type: boolean
        default: false
      source:
        description: "Source: pvinsights | taiyangnews | infolink | trendforce"
        type: string
        default: pvinsights

permissions:
  contents: write

concurrency:
  group: refresh-prices
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Fetch PV value-chain spot prices
        run: npx tsx scripts/ingest/prices.ts --source ${{ inputs.source || 'pvinsights' }} ${{ inputs.debug && '--debug' || '' }}
      - name: Rebuild snapshots
        run: npm run data:build
      - name: Commit & push if changed
        run: |
          git config user.name "solardash-bot"
          git config user.email "actions@users.noreply.github.com"
          git add manual-data/policy src/data/snapshots/policy
          if git diff --cached --quiet; then
            echo "No price changes."
          else
            git commit -m "chore(data): refresh PV value-chain prices"
            git push
          fi
