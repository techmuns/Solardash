name: Refresh policy schemes

# Two-part feed: an auto-scraper appends genuinely-new solar / RE schemes from
# MNRE's "What's New" documents feed (filtering out amendments, SOPs, circulars,
# fees…), while hand-curated rows in manual-data/policy/schemes.csv are never
# touched. This Action verifies the parser, runs the scraper, rebuilds the
# policy snapshot on the monthly cron (and on demand), and commits only if the
# rendered data changed — so both a scraped scheme and a CSV edit propagate
# without a manual rebuild.

on:
  schedule:
    - cron: '0 6 1 * *'      # 1st of each month, 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-policy
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify the scheme parser
        run: npx tsx scripts/ingest/policy-schemes.verify.ts
      - name: Scrape latest MNRE schemes
        # A blocked / failed fetch keeps the existing curated feed intact
        # (the script exits non-zero on fetch error but writes nothing), so
        # don't fail the whole run on a transient MNRE 403.
        continue-on-error: true
        run: npx tsx scripts/ingest/policy-schemes.ts
      - name: Rebuild snapshots
        run: npm run data:build
      - name: Commit & push if changed
        run: |
          git config user.name "solardash-bot"
          git config user.email "actions@users.noreply.github.com"
          git add manual-data/policy src/data/snapshots/policy
          if git diff --cached --quiet; then
            echo "No policy-scheme changes."
          else
            git commit -m "chore(data): refresh policy schemes"
            git push
          fi
